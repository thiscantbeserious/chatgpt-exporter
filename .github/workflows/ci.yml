name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, deps can turn vulnerable without a code change

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Vulnerability scan (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: --lockfile=package-lock.json

  release:
    # Auto-tag + GitHub release with the built bookmarklet whenever the
    # version in package.json changes on main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # changelog needs tags and full history
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Check if version needs a release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Gate on the RELEASE, not the tag: npm version pushes the tag
          # before CI runs, so a tag check always concludes "nothing to do".
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Update CHANGELOG.md
        if: steps.version.outputs.new == 'true'
        run: |
          V="v${{ steps.version.outputs.version }}"
          # previous tag EXCLUDING the current version's own tag (npm version
          # already pushed it pointing at HEAD)
          PREV=$(git tag --sort=-v:refname | grep -v "^$V$" | head -1 || echo "")
          RANGE=$([ -n "$PREV" ] && echo "$PREV..HEAD" || echo "HEAD")
          {
            echo "## $V ($(date +%Y-%m-%d))"
            echo
            git log --no-merges --pretty='- %s' $RANGE | grep -v '^- Co-Authored' || true
            echo
            # drop a stale Unreleased section; its commits are in the new version
            sed '/^## Unreleased/,/^## v/{/^## v/!d;}' CHANGELOG.md 2>/dev/null || true
          } > CHANGELOG.new
          mv CHANGELOG.new CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for $V [skip ci]"
          git push
      - name: Build
        if: steps.version.outputs.new == 'true'
        run: |
          npm ci
          npm run build
          cp src/export-chatgpt.js dist/export-chatgpt.js
          cd dist && zip "chatgpt-exporter-v${{ steps.version.outputs.version }}.zip" \
            bookmarklet.txt export-chatgpt.js
      - name: Tag and release
        if: steps.version.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="v${{ steps.version.outputs.version }}"
          # tag may already exist (npm version pushes it); create only if missing
          if ! git ls-remote --tags origin "$V" | grep -q .; then
            git tag "$V"
            git push origin "$V"
          fi
          gh release create "$V" \
            --title "$V" \
            --generate-notes \
            dist/bookmarklet.txt \
            dist/export-chatgpt.js \
            "dist/chatgpt-exporter-$V.zip"
